--- REPOSITORY CONFIGURATION ---

Determines if the app uses "cache" (file-based) or "database" (JDBC)

repository.type=database

--- ENVIRONMENT CONFIGURATION ---

Options: development, testing, production

app.env=development

--- DATABASE CONNECTION (H2) ---

Creates a local file named 'quantitymeasurementdb' in your project root

db.url=jdbc:h2:./quantitymeasurementdb;AUTO_SERVER=TRUE
db.username=sa
db.password=
db.driver=org.h2.Driver

--- CONNECTION POOL SETTINGS ---

Number of connections to keep ready in the fleet

db.pool-size=10

The query used to verify a connection is still "alive"

db.hikari.connection-test-query=SELECT 1

--- LOGGING CONFIGURATION ---

Root log level (INFO shows general progress, DEBUG shows detailed SQL)

logging.level.root=INFO
https://www.google.com/search?q=logging.level.com.app.quantitymeasurement=DEBUG

Format: Date - Logger Name - Message

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n